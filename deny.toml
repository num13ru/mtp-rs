# deny.toml - cargo-deny configuration for mtp-rs
#
# Run with: cargo deny check
# Documentation: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
ignore = [
    # Transitive dep of libmtp-rs (benchmark-only, not published). Nothing we can do upstream.
    "RUSTSEC-2024-0388",  # derivative unmaintained
]

[licenses]
confidence-threshold = 0.8
# Only list licenses actually used by dependencies to avoid warnings
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "Unicode-3.0",
    "CC0-1.0",
    "ISC",
]

[bans]
multiple-versions = "allow"  # Transitive deps often have duplicates we can't control
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
